services:
  postgres:
    image: postgres:16-alpine
    container_name: wmg-postgres
    environment:
      - POSTGRES_DB=worldmodel_gym
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: wmg-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  server:
    build:
      context: .
      dockerfile: docker/server.Dockerfile
    container_name: wmg-server
    environment:
      - WMG_UPLOAD_TOKEN=dev-token
      - WMG_LEGACY_UPLOAD_TOKEN_ENABLED=true
      - WMG_DB_URL=postgresql+psycopg://postgres:postgres@postgres:5432/worldmodel_gym
      - WMG_AUTO_MIGRATE=true
      - WMG_STORAGE_DIR=/app/server/storage
      - WMG_ENABLE_METRICS=true
      - WMG_REDIS_URL=redis://redis:6379/0
      - WMG_QUEUE_ENABLED=true
    volumes:
      - ./server/storage:/app/server/storage
      - ./runs:/app/runs
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    container_name: wmg-worker
    environment:
      - WMG_DB_URL=postgresql+psycopg://postgres:postgres@postgres:5432/worldmodel_gym
      - WMG_STORAGE_DIR=/app/server/storage
      - WMG_REDIS_URL=redis://redis:6379/0
      - WMG_QUEUE_ENABLED=true
    volumes:
      - ./server/storage:/app/server/storage
      - ./runs:/app/runs
    depends_on:
      - postgres
      - redis

  web:
    build:
      context: .
      dockerfile: docker/web.Dockerfile
    container_name: wmg-web
    environment:
      - NEXT_PUBLIC_API_BASE=http://localhost:8000
      - INTERNAL_API_BASE=http://server:8000
    depends_on:
      - server
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  redis-data:
