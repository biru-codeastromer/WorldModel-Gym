# Supply-Chain: build, push, sign & attest the API and worker images.
#
# On push to main and on version tags (v*), this builds the API and worker
# Docker images, pushes them to the GitHub Container Registry, generates an
# SBOM per image, signs each pushed image with cosign (keyless / OIDC, recorded
# in Rekor), and produces SLSA build-provenance + SBOM attestations bound to
# each image digest.
#
# Published images:
#   ghcr.io/biru-codeastromer/worldmodel-gym-api
#   ghcr.io/biru-codeastromer/worldmodel-gym-worker
#
# -- Verifying a signed image -----------------------------------------------
# Cosign was used keyless, so verification asserts the OIDC issuer (GitHub's
# token service) and the identity (this workflow's ref) rather than a key.
# Replace <digest> with the digest you want to verify (or use a tag):
#
#   cosign verify \
#     --certificate-oidc-issuer "https://token.actions.githubusercontent.com" \
#     --certificate-identity-regexp \
#       "^https://github.com/biru-codeastromer/WorldModel-Gym/\.github/workflows/supply-chain\.yml@refs/.*$" \
#     ghcr.io/biru-codeastromer/worldmodel-gym-api@sha256:<digest>
#
# Verify the build-provenance / SBOM attestations with the GitHub CLI:
#
#   gh attestation verify \
#     oci://ghcr.io/biru-codeastromer/worldmodel-gym-api@sha256:<digest> \
#     --repo biru-codeastromer/WorldModel-Gym
# ---------------------------------------------------------------------------

name: Supply Chain

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

# Cancel superseded runs on the same ref to avoid redundant builds.
concurrency:
  group: supply-chain-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write
  attestations: write

jobs:
  build-sign-attest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: api
            image: ghcr.io/biru-codeastromer/worldmodel-gym-api
            dockerfile: docker/server.Dockerfile
          - name: worker
            image: ghcr.io/biru-codeastromer/worldmodel-gym-worker
            dockerfile: docker/worker.Dockerfile
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Only authenticate when we intend to push (i.e. not on fork PRs).
      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,format=long
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}

      - name: Generate SBOM (Syft)
        id: sbom
        uses: anchore/sbom-action@v0
        with:
          image: ${{ matrix.image }}@${{ steps.build.outputs.digest }}
          format: spdx-json
          output-file: sbom-${{ matrix.name }}.spdx.json
          # The image only exists in the registry once we have pushed it.
          artifact-name: sbom-${{ matrix.name }}.spdx.json
        if: github.event_name != 'pull_request'

      - name: Upload SBOM artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: sbom-${{ matrix.name }}
          path: sbom-${{ matrix.name }}.spdx.json
          if-no-files-found: error

      - name: Install cosign
        if: github.event_name != 'pull_request'
        uses: sigstore/cosign-installer@v3

      - name: Sign image (keyless / OIDC)
        if: github.event_name != 'pull_request'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          IMAGE: ${{ matrix.image }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      - name: Attest build provenance
        if: github.event_name != 'pull_request'
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Attest SBOM
        if: github.event_name != 'pull_request'
        uses: actions/attest-sbom@v4
        with:
          subject-name: ${{ matrix.image }}
          subject-digest: ${{ steps.build.outputs.digest }}
          sbom-path: sbom-${{ matrix.name }}.spdx.json
          push-to-registry: true
