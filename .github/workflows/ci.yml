name: CI

on:
  push:
    branches:
      - main
  pull_request:

# Cancel superseded runs on the same ref to avoid redundant work.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            core/pyproject.toml
            agents/pyproject.toml
            planners/pyproject.toml
            worldmodels/pyproject.toml
            server/pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e core -e planners -e worldmodels -e agents -e server

      - name: Ruff
        run: |
          python -m ruff check .
          python -m ruff format --check .

      - name: Pytest
        run: |
          python -m pytest \
            --cov=worldmodel_gym \
            --cov=worldmodel_agents \
            --cov=worldmodel_planners \
            --cov=worldmodel_models \
            --cov=worldmodel_server \
            --cov-report=term-missing \
            --cov-report=xml \
            --cov-fail-under=82

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
          if-no-files-found: ignore

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        run: npm ci

      - name: Build Next.js app
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:8000
        run: npm run build

      - name: Web unit tests
        run: npm run test:unit

  web-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            core/pyproject.toml
            agents/pyproject.toml
            planners/pyproject.toml
            worldmodels/pyproject.toml
            server/pyproject.toml

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e core -e planners -e worldmodels -e agents -e server

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Install Playwright browser
        working-directory: web
        run: npx playwright install --with-deps chromium

      - name: Start API server
        run: |
          mkdir -p .tmp
          WMG_DB_URL=sqlite:///./.tmp/e2e.db \
          WMG_STORAGE_DIR=./.tmp/e2e-storage \
          WMG_UPLOAD_TOKEN=e2e-token \
          WMG_LEGACY_UPLOAD_TOKEN_ENABLED=true \
          WMG_AUTO_MIGRATE=true \
          WMG_ENABLE_METRICS=false \
          WMG_SEED_DEMO_DATA=true \
          python -m uvicorn worldmodel_server.main:app --host 127.0.0.1 --port 8100 > .tmp/e2e-api.log 2>&1 &
          echo $! > .tmp/e2e-api.pid

      - name: Start web server
        run: |
          mkdir -p .tmp
          cd web
          INTERNAL_API_BASE=http://127.0.0.1:8100 \
          NEXT_PUBLIC_API_BASE=http://127.0.0.1:8100 \
          npm run dev -- --hostname 127.0.0.1 --port 3100 > ../.tmp/e2e-web.log 2>&1 &
          echo $! > ../.tmp/e2e-web.pid

      - name: Wait for local services
        run: |
          python - <<'PY'
          import sys
          import time
          from urllib.request import urlopen

          targets = [
              "http://127.0.0.1:8100/healthz",
              "http://127.0.0.1:3100",
          ]
          deadline = time.time() + 120
          pending = set(targets)

          while pending and time.time() < deadline:
              for target in list(pending):
                  try:
                      with urlopen(target, timeout=2) as response:
                          if response.status < 500:
                              pending.remove(target)
                  except Exception:
                      pass
              if pending:
                  time.sleep(2)

          if pending:
              raise SystemExit(f"Services did not start in time: {sorted(pending)}")
          PY

      - name: Run Playwright smoke tests
        working-directory: web
        env:
          PLAYWRIGHT_DISABLE_WEBSERVER: "1"
        run: npm run test:e2e

      - name: Dump server logs on failure
        if: failure()
        run: |
          echo "===== API LOG ====="
          cat .tmp/e2e-api.log || true
          echo "===== WEB LOG ====="
          cat .tmp/e2e-web.log || true

      - name: Stop background services
        if: always()
        run: |
          kill $(cat .tmp/e2e-api.pid) 2>/dev/null || true
          kill $(cat .tmp/e2e-web.pid) 2>/dev/null || true

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: |
            requirements-dev.txt
            core/pyproject.toml
            agents/pyproject.toml
            planners/pyproject.toml
            worldmodels/pyproject.toml
            server/pyproject.toml

      - name: Install security tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit bandit

      - name: pip-audit (dependency vulnerabilities)
        # Audits the hashed lockfile closure. Pre-existing transitive advisories
        # we cannot fix here should not block merges, so failures are surfaced
        # but non-blocking.
        continue-on-error: true
        run: |
          if [ -f requirements.lock ]; then
            pip-audit --requirement requirements.lock
          else
            echo "requirements.lock not found; auditing installed environment"
            pip install -e core -e planners -e worldmodels -e agents -e server
            pip-audit
          fi

      - name: Bandit (server SAST)
        # Fail hard on medium+ severity findings in server source.
        run: bandit -r server -ll

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: npm audit (web)
        # High+ advisories are surfaced; non-blocking to avoid breaking on
        # pre-existing upstream advisories that cannot be remediated here.
        continue-on-error: true
        working-directory: web
        run: npm audit --audit-level=high

      - name: Gitleaks (secret scan)
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
