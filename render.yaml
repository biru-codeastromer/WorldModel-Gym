services:
  - type: web
    name: worldmodel-gym-api
    env: docker
    dockerfilePath: ./docker/server.Dockerfile
    dockerContext: .
    # PRODUCTION POSTURE: `free` runs a single instance and sleeps on idle, so it
    # is fine for a demo but NOT for real production. The API is now fully
    # stateless (Postgres holds run metadata, S3 holds artifacts, Redis backs the
    # rate limiter and queue), so it can safely run multiple replicas behind
    # Render's load balancer. To go multi-replica:
    #   1. Bump this to a paid plan that supports horizontal scaling
    #      (`starter` or higher) — `free` ignores `numInstances`/`scaling`.
    #   2. Uncomment the `scaling` block below (autoscaling) OR set a fixed
    #      `numInstances:` count.
    # Replica safety has already been engineered for: WMG_AUTO_MIGRATE=false plus
    # the `preDeployCommand` migration means replicas never race to migrate, and
    # there is no instance-local state to lose on scale-in.
    plan: free
    # numInstances: 2
    # scaling:
    #   minInstances: 2
    #   maxInstances: 5
    #   targetMemoryPercent: 70
    #   targetCPUPercent: 70
    healthCheckPath: /healthz
    autoDeploy: true
    # Decouple schema migrations from request-serving startup: run the migration
    # once as part of the deploy (before traffic shifts) rather than on every
    # process boot. This keeps horizontally-scaled API replicas from racing to
    # migrate, and lets WMG_AUTO_MIGRATE stay false at runtime.
    preDeployCommand: python -m worldmodel_server.cli migrate
    envVars:
      - key: WMG_ENV
        value: production
      # WMG_DB_URL is wired from the managed Postgres declared in the top-level
      # `databases:` block below. Render injects the credential-bearing
      # connection string at deploy time, so it is never committed to git.
      - key: WMG_DB_URL
        fromDatabase:
          name: worldmodel-gym-db
          property: connectionString
      - key: WMG_AUTO_MIGRATE
        value: "false"
      # Durable, S3-compatible storage is REQUIRED in production. The container
      # filesystem is ephemeral, so local storage would silently lose every
      # uploaded artifact on each restart/redeploy. The S3 credentials below are
      # dashboard-managed secrets (sync:false) — set them before the first deploy
      # or the API will intentionally refuse to start.
      - key: WMG_STORAGE_BACKEND
        value: s3
      - key: WMG_S3_BUCKET
        sync: false
      - key: WMG_S3_REGION
        sync: false
      - key: WMG_S3_ENDPOINT_URL
        sync: false
      - key: WMG_S3_ACCESS_KEY_ID
        sync: false
      - key: WMG_S3_SECRET_ACCESS_KEY
        sync: false
      # Do not seed synthetic benchmark data into the production leaderboard.
      - key: WMG_SEED_DEMO_DATA
        value: "false"
      # Observability: expose the Prometheus /metrics endpoint and emit
      # structured (JSON) access + system logs at INFO so Render's log drain and
      # any scraper can correlate by request_id. See docs/OBSERVABILITY.md.
      - key: WMG_ENABLE_METRICS
        value: "true"
      - key: WMG_LOG_JSON
        value: "true"
      - key: WMG_LOG_LEVEL
        value: "INFO"
      - key: WMG_CORS_ORIGINS
        value: https://world-model-gym.vercel.app
      - key: WMG_LEGACY_UPLOAD_TOKEN_ENABLED
        value: "false"
      # Render terminates TLS at its load balancer and sets X-Forwarded-For;
      # trust it so per-client rate limiting keys on the real client IP.
      - key: WMG_TRUST_PROXY_HEADERS
        value: "true"
      # Optional one-time bootstrap for the first admin/writer key.
      # Remove after a durable production API key is in place.
      - key: WMG_BOOTSTRAP_API_KEY
        generateValue: true
      # Managed Redis connection — powers the distributed rate limiter and the
      # async job queue. Pulled from the keyvalue instance defined below.
      - key: WMG_REDIS_URL
        fromService:
          type: keyvalue
          name: worldmodel-gym-redis
          property: connectionString

  # Background worker that drains the RQ job queue and runs evaluations. Uses
  # the torch-bearing worker image; never serves HTTP traffic.
  - type: worker
    name: worldmodel-gym-worker
    env: docker
    dockerfilePath: ./docker/worker.Dockerfile
    dockerContext: .
    plan: starter
    autoDeploy: true
    envVars:
      - key: WMG_ENV
        value: production
      # Shares the same managed Postgres as the API (declared in `databases:`).
      - key: WMG_DB_URL
        fromDatabase:
          name: worldmodel-gym-db
          property: connectionString
      - key: WMG_QUEUE_ENABLED
        value: "true"
      # The worker writes eval artifacts to the same durable S3 store.
      - key: WMG_STORAGE_BACKEND
        value: s3
      - key: WMG_S3_BUCKET
        sync: false
      - key: WMG_S3_REGION
        sync: false
      - key: WMG_S3_ENDPOINT_URL
        sync: false
      - key: WMG_S3_ACCESS_KEY_ID
        sync: false
      - key: WMG_S3_SECRET_ACCESS_KEY
        sync: false
      - key: WMG_LOG_JSON
        value: "true"
      - key: WMG_LOG_LEVEL
        value: "INFO"
      - key: WMG_REDIS_URL
        fromService:
          type: keyvalue
          name: worldmodel-gym-redis
          property: connectionString

  # Managed Redis (Render "keyvalue") used as the RQ broker and the shared rate
  # limiter backend. `noeviction` keeps queued jobs from being dropped under
  # memory pressure.
  - type: keyvalue
    name: worldmodel-gym-redis
    plan: starter
    maxmemoryPolicy: noeviction
    ipAllowList: []

# Managed Postgres — the single source of truth for run metadata, API keys, and
# leaderboard ranking columns. Both the API and the worker connect to it via the
# `fromDatabase` references above; artifact BLOBS live in S3, not here, so the
# database stays small. `ipAllowList: []` keeps it reachable only from inside
# Render's private network (no public ingress). Pick a paid plan with automated
# daily backups + point-in-time recovery for real production; `starter` is the
# floor that supports persistent storage.
databases:
  - name: worldmodel-gym-db
    plan: starter
    databaseName: worldmodel_gym
    user: worldmodel_gym
    ipAllowList: []
